[defaults]
rdp_command = "mstsc"
ssh_command = "ssh"
rdp_extra_args = []
ssh_extra_args = []
# 在新终端窗口中打开 SSH，便于同时连接多台主机。
ssh_new_window = true

[[servers]]
name = "Windows Jumpbox"
host = "10.0.0.10"
group = "production"
protocol = "rdp"
port = 3389
user = "administrator"
password = "your-rdp-password"
expires_at = "2028-09-02"
note = "Windows 远程桌面示例。"
tags = ["windows", "rdp", "jumpbox"]

[[servers]]
name = "Linux Bastion"
host = "10.0.0.20"
group = "production"
protocol = "ssh"
port = 22
user = "ops"
private_key_path = "C:\\Users\\you\\.ssh\\id_ed25519"
note = "SSH 堡垒机示例。"
tags = ["linux", "ssh", "bastion"]

[[servers]]
name = "Custom RDP File"
host = "rdp-file-placeholder"
group = "office"
protocol = "rdp"
rdp_file = "C:\\Users\\you\\Documents\\office.rdp"
note = "设置 rdp_file 后，remhub 会直接启动该 .rdp 文件。"
tags = ["rdp-file"]
